services:
  mysql8:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: rag-mysql8
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "rag_system"
      MYSQL_USER: "rag_admin"
      MYSQL_PASSWORD: "rag_jin"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - rag-net

  es:
    build:
      context: ..
      dockerfile: backend/docker/elasticsearch/Dockerfile
      args:
        ELASTICSEARCH_BASE_IMAGE: ${ELASTICSEARCH_BASE_IMAGE:-docker.m.daocloud.io/library/elasticsearch:7.17.10}
    image: rag-elasticsearch-ik:local
    container_name: rag-es7
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      xpack.security.enabled: "false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - rag-net

  kibana:
    image: docker.m.daocloud.io/library/kibana:7.17.10
    container_name: rag-kibana
    restart: unless-stopped
    depends_on:
      - es
    volumes:
      - kibana-logs:/usr/share/kibana/logs
    environment:
      - "I18N_LOCALE=zh-CN"
      - "ELASTICSEARCH_HOSTS=http://es:9200"
    ports:
      - "5601:5601"
    networks:
      - rag-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - rag-net

  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2023-12-23T07-19-11Z
    container_name: rag-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: minio server /data --console-address ":9001"
    networks:
      - rag-net

  milvus-standalone:
    image: docker.m.daocloud.io/milvusdb/milvus:v2.4.10
    container_name: rag-milvus
    platform: linux/amd64
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - rag-net
    command: ["milvus", "run", "standalone"]

  attu:
    image: docker.m.daocloud.io/zilliz/attu:v2.4.12
    container_name: rag-attu
    restart: unless-stopped
    depends_on:
      - milvus-standalone
    ports:
      - "8001:3000"
    environment:
      - MILVUS_URL=milvus-standalone:19530
      - ATTU_LOG_LEVEL=info
    networks:
      - rag-net

  redis:
    image: docker.m.daocloud.io/library/redis:7.2-alpine
    container_name: rag-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rag-net

  zookeeper:
    image: docker.m.daocloud.io/confluentinc/cp-zookeeper:7.6.0
    container_name: rag-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
      - zookeeper-secrets:/etc/zookeeper/secrets
    networks:
      - rag-net

  kafka:
    image: docker.m.daocloud.io/confluentinc/cp-kafka:7.6.0
    container_name: rag-kafka
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9094
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9094
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_MESSAGE_MAX_BYTES=10485760
      - KAFKA_REPLICA_FETCH_MAX_BYTES=10485760
    depends_on:
      - zookeeper
    volumes:
      - kafka-data:/var/lib/kafka/data
      - kafka-secrets:/etc/kafka/secrets
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s
    networks:
      - rag-net

  kafka-ui:
    image: docker.m.daocloud.io/provectuslabs/kafka-ui:latest
    container_name: rag-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=rag-kafka-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
      - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - rag-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
    image: rag-backend:local
    container_name: rag-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: rag-mysql8
      REDIS_HOST: rag-redis
      ES_HOST: http://rag-es7:9200
      MILVUS_HOST: rag-milvus
      KAFKA_BOOTSTRAP_SERVERS: rag-kafka:29092
      CORS_ORIGINS: http://localhost:33004,http://127.0.0.1:33004,http://localhost:8080,http://rag-front:3000
    command:
      - sh
      - -c
      - python -m alembic -c alembic.ini upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      mysql8:
        condition: service_started
      redis:
        condition: service_started
      es:
        condition: service_started
      milvus-standalone:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    ports:
      - "38084:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rag-net

  parser:
    image: rag-backend:local
    container_name: rag-parser
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: rag-mysql8
      REDIS_HOST: rag-redis
      ES_HOST: http://rag-es7:9200
      MILVUS_HOST: rag-milvus
      KAFKA_BOOTSTRAP_SERVERS: rag-kafka:29092
    command: ["python", "-m", "app.workers.parser"]
    depends_on:
      backend:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - rag-net

  splitter:
    image: rag-backend:local
    container_name: rag-splitter
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: rag-mysql8
      REDIS_HOST: rag-redis
      ES_HOST: http://rag-es7:9200
      MILVUS_HOST: rag-milvus
      KAFKA_BOOTSTRAP_SERVERS: rag-kafka:29092
    command: ["python", "-m", "app.workers.splitter"]
    depends_on:
      backend:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - rag-net

  vectorizer:
    image: rag-backend:local
    container_name: rag-vectorizer
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DB_HOST: rag-mysql8
      REDIS_HOST: rag-redis
      ES_HOST: http://rag-es7:9200
      MILVUS_HOST: rag-milvus
      KAFKA_BOOTSTRAP_SERVERS: rag-kafka:29092
    command: ["python", "-m", "app.workers.vectorizer"]
    depends_on:
      backend:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - rag-net

  front:
    build:
      context: ../front
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NEXT_PUBLIC_API_URL: http://localhost:38084
        INTERNAL_API_URL: http://backend:8000
    image: rag-front:local
    container_name: rag-front
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:38084
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "33004:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rag-net

volumes:
  mysql-data:
    name: rag-mysql-data
    external: true
  es-data:
    name: rag-es-data
    external: true
  kibana-logs:
    name: rag-kibana-logs
    external: true
  etcd-data:
    name: rag-etcd-data
    external: true
  minio-data:
    name: rag-minio-data
    external: true
  milvus-data:
    name: rag-milvus-data
    external: true
  redis-data:
    name: rag-redis-data
    external: true
  zookeeper-data:
    name: rag-zookeeper-data
    external: true
  zookeeper-log:
    name: rag-zookeeper-log
    external: true
  zookeeper-secrets:
    name: rag-zookeeper-secrets
    external: true
  kafka-data:
    name: rag-kafka-data
    external: true
  kafka-secrets:
    name: rag-kafka-secrets
    external: true

networks:
  rag-net:
    name: rag-net
    external: true
